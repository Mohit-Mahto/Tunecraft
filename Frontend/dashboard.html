<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Tunecraft</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Dots&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#08070f;--surface:#0b0a14;--card:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.08);--orange:#ff6b00;--gold:#ffd700;--purple:#7c3aed;--blue:#00d4ff;--green:#00ff88;--text:#f0eef8;--muted:#6b6882;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;display:flex;}

    /* Sidebar */
    .sidebar{width:250px;background:var(--surface);border-right:1px solid var(--border);height:100vh;position:fixed;left:0;top:0;display:flex;flex-direction:column;padding:1.5rem 1rem;overflow:hidden;}
    .sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--orange),var(--gold),var(--purple));}
    .logo{font-family:'Zen Dots',sans-serif;font-size:1.5rem;letter-spacing:2px;padding:.5rem;margin-bottom:2rem;position:relative;display:inline-block;}
    .logo span{color:var(--orange);}
    .logo::after{content:'音';position:absolute;top:-6px;right:-14px;font-size:.6rem;color:var(--gold);opacity:.7;}
    .nav-section{font-size:.65rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:800;padding:0 .8rem;margin-bottom:.5rem;margin-top:1rem;}
    .nav-item{display:flex;align-items:center;gap:.75rem;padding:.7rem .8rem;cursor:pointer;transition:all .2s;text-decoration:none;color:var(--muted);font-size:.88rem;font-weight:700;margin-bottom:.2rem;position:relative;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);}
    .nav-item:hover{background:rgba(255,255,255,.04);color:var(--text);}
    .nav-item.active{background:rgba(255,107,0,.1);color:var(--orange);}
    .nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--orange);box-shadow:0 0 8px var(--orange);}
    .nav-item .icon{font-size:1rem;width:20px;text-align:center;}
    .sidebar-bottom{margin-top:auto;}
    .user-card{background:rgba(255,255,255,.03);border:1px solid var(--border);padding:1rem;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);}
    .user-name{font-weight:800;font-size:.9rem;margin-bottom:.2rem;}
    .user-email{color:var(--muted);font-size:.72rem;margin-bottom:.8rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .lang-row{display:flex;gap:.5rem;margin-bottom:.6rem;}
    .lang-btn{flex:1;padding:.35rem;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:.75rem;font-weight:700;transition:all .2s;clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);}
    .lang-btn.active{background:rgba(255,107,0,.15);border-color:var(--orange);color:var(--orange);}
    .logout-btn{width:100%;padding:.5rem;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:.78rem;font-weight:700;transition:all .2s;clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);}
    .logout-btn:hover{border-color:#ff2d55;color:#ff2d55;}

    /* Main */
    .main{margin-left:250px;padding:2.5rem;flex:1;}
    .page-header{margin-bottom:2.5rem;}
    .greeting{font-family:'Zen Dots',sans-serif;font-size:1.8rem;letter-spacing:1px;line-height:1.2;}
    .greeting .name{color:var(--orange);}
    .greeting-sub{color:var(--muted);margin-top:.4rem;font-size:.9rem;}

    /* Stats */
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem;}
    .stat-card{background:var(--card);border:1px solid var(--border);padding:1.5rem;clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));position:relative;overflow:hidden;transition:border-color .3s;}
    .stat-card:hover{border-color:rgba(255,107,0,.25);}
    .stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
    .stat-card:nth-child(1)::after{background:linear-gradient(90deg,var(--orange),var(--gold));}
    .stat-card:nth-child(2)::after{background:linear-gradient(90deg,var(--purple),var(--blue));}
    .stat-card:nth-child(3)::after{background:linear-gradient(90deg,var(--blue),var(--green));}
    .stat-label{font-size:.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:800;margin-bottom:.5rem;}
    .stat-val{font-family:'Zen Dots',sans-serif;font-size:2.5rem;line-height:1;}
    .stat-val.o{color:var(--orange);text-shadow:0 0 15px rgba(255,107,0,.4);}
    .stat-val.p{color:var(--purple);text-shadow:0 0 15px rgba(124,58,237,.4);}
    .stat-val.b{color:var(--blue);text-shadow:0 0 15px rgba(0,212,255,.4);}

    /* Progress */
    .progress-card{background:var(--card);border:1px solid var(--border);padding:1.8rem;margin-bottom:2rem;clip-path:polygon(0 0,calc(100% - 16px) 0,100% 16px,100% 100%,16px 100%,0 calc(100% - 16px));}
    .progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
    .progress-title{font-family:'Zen Dots',sans-serif;font-size:.95rem;letter-spacing:1px;}
    .progress-pct{font-family:'Zen Dots',sans-serif;color:var(--gold);font-size:1.1rem;}
    .progress-bg{background:rgba(255,255,255,.05);height:10px;overflow:hidden;position:relative;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--gold),var(--red,#ff2d55));transition:width 1.2s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 12px rgba(255,107,0,.6);position:relative;}
    .progress-fill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:4px;background:#fff;opacity:.5;filter:blur(2px);}

    /* Courses */
    .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;}
    .section-title{font-family:'Zen Dots',sans-serif;font-size:1.1rem;letter-spacing:1px;}
    .courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;}
    .course-card{background:var(--card);border:1px solid var(--border);padding:1.5rem;cursor:pointer;transition:all .3s;text-decoration:none;color:inherit;display:block;clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));position:relative;overflow:hidden;}
    .course-card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(255,107,0,.06),transparent 60%);opacity:0;transition:.3s;}
    .course-card:hover{border-color:rgba(255,107,0,.3);transform:translateY(-4px);box-shadow:0 15px 40px rgba(0,0,0,.4);}
    .course-card:hover::before{opacity:1;}
    .course-num{font-size:.65rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-weight:800;margin-bottom:.5rem;}
    .course-name{font-weight:900;font-size:.95rem;margin-bottom:.4rem;}
    .course-desc{color:var(--muted);font-size:.82rem;line-height:1.5;margin-bottom:1rem;}
    .course-footer{display:flex;align-items:center;justify-content:space-between;}
    .lessons-count{font-size:.75rem;color:var(--muted);}
    .course-arrow{color:var(--orange);font-size:1rem;}
    .loading{color:var(--muted);text-align:center;padding:3rem;font-size:.9rem;}
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="logo">Tune<span>craft</span></div>
    <div class="nav-section">Main</div>
    <a class="nav-item active" href="dashboard.html"><span class="icon">🏯</span>Dashboard</a>
    <a class="nav-item" href="learn.html"><span class="icon">📜</span>Learning Path</a>
    <a class="nav-item" href="practice.html"><span class="icon">🎛️</span>Training Room</a>
    <a class="nav-item" href="#"><span class="icon">⚡</span>My Power Level</a>
    <div class="sidebar-bottom">
      <div class="user-card">
        <div class="user-name" id="sidebarName">Loading...</div>
        <div class="user-email" id="sidebarEmail"></div>
        <div class="lang-row">
          <button class="lang-btn active" id="btnEn" onclick="setLang('en')">EN</button>
          <button class="lang-btn" id="btnHi" onclick="setLang('hi')">हिंदी</button>
        </div>
        <button class="logout-btn" onclick="logout()">⚡ Log Out</button>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <div class="greeting">Welcome back, <span class="name" id="greetName">Shinobi</span>! ⚡</div>
      <div class="greeting-sub">Your training arc continues. Keep pushing forward.</div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Missions Done</div><div class="stat-val o" id="statCompleted">—</div></div>
      <div class="stat-card"><div class="stat-label">Total Missions</div><div class="stat-val p" id="statTotal">—</div></div>
      <div class="stat-card"><div class="stat-label">Power Level</div><div class="stat-val b" id="statPct">—%</div></div>
    </div>
    <div class="progress-card">
      <div class="progress-header">
        <div class="progress-title">⚔ Overall Progress</div>
        <div class="progress-pct" id="progressPct">0%</div>
      </div>
      <div class="progress-bg"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>
    </div>
    <div class="section-header">
      <div class="section-title">📜 Your Training Scrolls</div>
    </div>
    <div class="courses-grid" id="coursesGrid"><div class="loading">Loading missions...</div></div>
  </main>

  <script>
    const API='http://127.0.0.1:8000';
    const token=localStorage.getItem('tc_token');
    const user=JSON.parse(localStorage.getItem('tc_user')||'{}');
    if(!token)window.location.href='login.html';
    document.getElementById('sidebarName').textContent=user.full_name||user.username||'Shinobi';
    document.getElementById('sidebarEmail').textContent=user.email||'';
    document.getElementById('greetName').textContent=user.full_name||user.username||'Shinobi';
    const lang=user.preferred_language||'en';
    if(lang==='hi'){document.getElementById('btnHi').classList.add('active');document.getElementById('btnEn').classList.remove('active');}

    async function authFetch(url){
      const res=await fetch(API+url,{headers:{'Authorization':`Bearer ${token}`}});
      if(res.status===401){logout();return null;}
      return res.json();
    }
    async function loadProgress(){
      const data=await authFetch('/api/progress/summary');
      if(!data)return;
      document.getElementById('statCompleted').textContent=data.completed_lessons;
      document.getElementById('statTotal').textContent=data.total_lessons;
      document.getElementById('statPct').textContent=data.percentage+'%';
      document.getElementById('progressPct').textContent=data.percentage+'%';
      setTimeout(()=>{document.getElementById('progressBar').style.width=data.percentage+'%';},100);
    }
    async function loadCourses(){
      const courses=await authFetch('/api/courses/');
      if(!courses)return;
      const grid=document.getElementById('coursesGrid');
      if(!courses.length){grid.innerHTML='<div class="loading">No missions yet.</div>';return;}
      grid.innerHTML=courses.map((c,i)=>`
        <a class="course-card" href="learn.html?course=${c.id}" onmousemove="cardGlow(this,event)">
          <div class="course-num">Mission ${String(i+1).padStart(2,'0')}</div>
          <div class="course-name">${lang==='hi'&&c.title_hi?c.title_hi:c.title}</div>
          <div class="course-desc">${lang==='hi'&&c.description_hi?c.description_hi:(c.description||'')}</div>
          <div class="course-footer"><span class="lessons-count">⚔ ${c.lessons.length} lessons</span><span class="course-arrow">→</span></div>
        </a>`).join('');
    }
    function cardGlow(el,e){const r=el.getBoundingClientRect();el.style.setProperty('--mx',((e.clientX-r.left)/r.width*100)+'%');el.style.setProperty('--my',((e.clientY-r.top)/r.height*100)+'%');}
    async function setLang(l){
      document.getElementById('btnEn').classList.toggle('active',l==='en');
      document.getElementById('btnHi').classList.toggle('active',l==='hi');
      await fetch(`${API}/api/users/me/language?language=${l}`,{method:'PUT',headers:{'Authorization':`Bearer ${token}`}});
      user.preferred_language=l;localStorage.setItem('tc_user',JSON.stringify(user));loadCourses();
    }
    function logout(){localStorage.removeItem('tc_token');localStorage.removeItem('tc_user');window.location.href='login.html';}
    loadProgress();loadCourses();
  </script>
</body>
</html>
